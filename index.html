
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ef4444">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hemo-Stats">
    <link rel="apple-touch-icon" sizes="180x180" href="https://lookaside.fbsbx.com/lookaside/crawler/media/?media_id=934812425420904">
    <link rel="icon" type="image/png" sizes="32x32" href="https://lookaside.fbsbx.com/lookaside/crawler/media/?media_id=934812425420904">
    <link rel="icon" type="image/png" sizes="16x16" href="https://lookaside.fbsbx.com/lookaside/crawler/media/?media_id=934812425420904">
    <link rel="manifest" href="/manifest.json">
    <title>Hemo-Stats | CNTS CI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        :root {
            --bg-base: #f8fafc;
            --accent-primary: #3b82f6;
            --accent-secondary: #6366f1;
            --accent-warm: #f43f5e;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(245, 158, 11, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
            color: #0f172a;
            min-height: 100vh;
            min-height: calc(var(--vh, 1vh) * 100);
            margin: 0;
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
            -webkit-overflow-scrolling: touch;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            overscroll-behavior-y: none;
        }
        ::-webkit-scrollbar { display: none; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 50px -12px rgba(15, 23, 42, 0.12);
            transition: var(--transition-smooth);
        }

        .page-transition {
            animation: slideUpFade 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(20px) scale(0.98); filter: blur(4px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        button, a, .card, .interactive {
            transition: var(--transition-smooth);
            user-select: none;
            -webkit-user-select: none;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Fluid scrolling for all overflow containers */
        .overflow-y-auto, .overflow-x-auto {
            -webkit-overflow-scrolling: touch;
        }

        /* Better focus states for accessibility but clean on touch */
        :focus:not(:focus-visible) {
            outline: none;
        }
        
        /* Tablet and Mobile specific adjustments */
        @media (max-width: 1024px) {
            .glass-nav {
                backdrop-filter: blur(16px) saturate(150%);
            }
        }

        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .pt-safe { padding-top: env(safe-area-inset-top); }
        .mb-safe { margin-bottom: env(safe-area-inset-bottom); }
        .mt-safe { margin-top: env(safe-area-inset-top); }
        .bottom-safe { bottom: env(safe-area-inset-bottom); }
    </style>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<link rel="stylesheet" href="/index.css">
    <script>
        // Fix for 100vh on mobile browsers
        const setVh = () => {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        };
        window.addEventListener('resize', setVh);
        window.addEventListener('orientationchange', setVh);
        setVh();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
